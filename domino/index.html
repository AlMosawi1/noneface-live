<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Domino Multiplayer</title><script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script><style>body{margin:0;font-family:Arial,sans-serif;background:#0c3b25;color:white;padding:20px}body.light{background:#edf7ef;color:#111}.wrap{max-width:1150px;margin:auto}.top{display:flex;justify-content:space-between;margin-bottom:20px}button,input,select,a{padding:10px 12px;border-radius:10px;border:1px solid #ffffff55;background:#123;color:white;margin:4px;text-decoration:none}body.light button,body.light input,body.light select,body.light a{background:white;color:#111}.card{border:1px solid #ffffff44;border-radius:16px;padding:16px;margin:12px 0;background:rgba(0,0,0,.18)}body.light .card{background:rgba(255,255,255,.75)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.hidden{display:none}.roomCode{text-align:center;font-size:32px;letter-spacing:5px}.players{display:grid;gap:8px}.player{display:flex;justify-content:space-between;border:1px solid #ffffff44;border-radius:10px;padding:8px}.off{opacity:.55}.boardWrap{overflow-x:auto;border-radius:14px;background:#075f38;padding:12px}.dropRow{display:flex;gap:10px;align-items:center;min-width:max-content}.dropZone{border:2px dashed #fff8;border-radius:14px;min-width:90px;min-height:120px;display:flex;align-items:center;justify-content:center;color:#fff9}.dropZone.over{background:#ffffff22}.board{display:flex;gap:10px;min-height:150px;align-items:center}.hand{display:flex;gap:10px;flex-wrap:wrap}.domino{border:2px solid #111;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;background:#f8f8f8;color:#111;box-shadow:0 4px 10px #0006;transition:.18s}.domino:hover{transform:translateY(-3px)}.domino.blocked{opacity:.34;filter:grayscale(1);transform:none}.domino.playable{box-shadow:0 0 0 3px #ffd166,0 6px 14px #0007}.v{width:54px;height:100px;flex-direction:column}.h{width:100px;height:54px;flex-direction:row}.small.v{width:42px;height:78px}.small.h{width:78px;height:42px}.lineV{width:80%;height:2px;background:#111}.lineH{width:2px;height:80%;background:#111}.status{text-align:center;font-weight:bold;margin-top:10px}.danger{border-color:#ff4757}.choices{text-align:center}</style></head><body><main class="wrap"><div class="top"><a href="../index.html">Home</a><button onclick="toggleTheme()">Light/Dark</button></div><h1>Domino Multiplayer</h1><section id="menu" class="grid"><div class="card"><h2>Host a Game</h2><input id="hostName" placeholder="Display name"><select id="mode"><option value="1v1">1v1</option><option value="2v2">2v2</option></select><input id="entryScore" type="number" value="21"><input id="targetScore" type="number" value="100"><button onclick="hostGame()">Host Game</button></div><div class="card"><h2>Join / Reconnect</h2><input id="joinName" placeholder="Display name"><input id="joinCode" maxlength="6" placeholder="Room code"><button onclick="joinGame()">Join Game</button><button onclick="rejoinGame()">Reconnect</button></div></section><section id="room" class="hidden"><div class="card"><div id="roomCode" class="roomCode">------</div><p id="info"></p><button id="startBtn" onclick="startGame()">Start Game</button><button class="danger" onclick="quitGame()">Quit Game</button></div><div class="grid"><div class="card"><h2>Players</h2><div id="players" class="players"></div></div><div class="card"><h2>Board</h2><div class="boardWrap"><div class="dropRow"><div id="leftDrop" class="dropZone">Left</div><div id="board" class="board"></div><div id="rightDrop" class="dropZone">Right</div></div></div></div></div><div class="card"><h2>Your Hand</h2><p id="hint">Playable pieces are highlighted. Drag a playable piece to Left or Right, or click it.</p><div id="hand" class="hand"></div><div id="choices" class="choices hidden"><button onclick="placeChosen('left')">Place Left</button><button onclick="placeChosen('right')">Place Right</button></div></div></section><div id="status" class="status"></div></main><script>const BACKEND="https://noneface-domino.onrender.com";let savedPid=localStorage.getItem('dominoPid')||crypto.randomUUID();localStorage.setItem('dominoPid',savedPid);let savedCode=localStorage.getItem('dominoCode')||'';let socket=io(BACKEND,{transports:['websocket','polling']});let myId=null,currentRoom=null,roomState=null,myHand=[],pending=null,legalMap={};function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark')}if(localStorage.getItem('theme')==='light')document.body.classList.add('light');function msg(t){status.textContent=t}socket.on('connect',()=>{myId=socket.id;msg('Connected');if(savedCode)socket.emit('rejoinGame',{pid:savedPid,code:savedCode})});socket.on('session',d=>{savedPid=d.pid;currentRoom=d.code;localStorage.setItem('dominoPid',d.pid);localStorage.setItem('dominoCode',d.code)});socket.on('roomJoined',showRoom);socket.on('roomUpdated',showRoom);socket.on('gameStarted',d=>showRoom(d.room));socket.on('yourHand',h=>{myHand=h;calculateLegal();renderHand()});socket.on('boardUpdated',d=>showRoom(d.room));socket.on('autoDrew',d=>msg('Auto drew '+d.count+' domino(es)'));socket.on('legalSides',d=>{if(!d.sides.length)return msg('Illegal move');if(d.sides.length===1)play(d.domino,d.sides[0]);else{pending=d.domino;choices.classList.remove('hidden')}});socket.on('gameWon',d=>{alert('Winner: '+d.winnerName+'\nReason: '+d.reason);msg('Winner: '+d.winnerName)});socket.on('errorMessage',msg);socket.on('kicked',()=>{alert('You were kicked');localStorage.removeItem('dominoCode');location.reload()});socket.on('banned',()=>{alert('You were banned');localStorage.removeItem('dominoCode');location.reload()});function hostGame(){socket.emit('hostGame',{pid:savedPid,name:hostName.value||'Host',mode:mode.value,entryScore:+entryScore.value||21,targetScore:+targetScore.value||100})}function joinGame(){socket.emit('joinGame',{pid:savedPid,name:joinName.value||'Player',code:joinCode.value.trim().toUpperCase()})}function rejoinGame(){socket.emit('rejoinGame',{pid:savedPid,code:(joinCode.value||savedCode).trim().toUpperCase()})}function showRoom(r){roomState=r;currentRoom=r.code;localStorage.setItem('dominoCode',r.code);menu.classList.add('hidden');room.classList.remove('hidden');roomCode.textContent=r.code;let tp=r.players.find(p=>p.id===r.turn);info.textContent='Mode: '+r.mode+' | Players: '+r.players.length+'/'+r.neededPlayers+' | Boneyard: '+r.boneyardCount+' | Turn: '+(tp?tp.name:'-');renderPlayers(r);renderBoard(r.board||[]);calculateLegal();renderHand();let amHost=r.players.some(p=>p.id===myId&&p.host);startBtn.disabled=!amHost||r.started||r.players.length!==r.neededPlayers}function renderPlayers(r){players.innerHTML='';let amHost=r.players.some(p=>p.id===myId&&p.host);r.players.forEach(p=>{let d=document.createElement('div');d.className='player '+(p.connected?'':'off');d.innerHTML='<span>'+p.name+(p.host?' 👑':'')+' | Team '+p.team+' | '+p.handCount+(p.connected?'':' | Reconnecting...')+'</span>';if(amHost&&!p.host&&!r.started){let k=document.createElement('button');k.textContent='Kick';k.onclick=()=>socket.emit('kickPlayer',{code:r.code,playerId:p.id});let b=document.createElement('button');b.textContent='Ban';b.className='danger';b.onclick=()=>socket.emit('banPlayer',{code:r.code,playerId:p.id});d.append(k,b)}players.appendChild(d)})}function same(a,b){return(a[0]===b[0]&&a[1]===b[1])||(a[0]===b[1]&&a[1]===b[0])}function edges(){if(!roomState||!roomState.board.length)return{left:null,right:null};return{left:roomState.board[0].domino[0],right:roomState.board[roomState.board.length-1].domino[1]}}function sidesFor(d){if(!roomState||roomState.turn!==myId)return[];if(!roomState.board.length){return(!roomState.firstRequired||same(d,roomState.firstRequired))?['start']:[]}let e=edges(),s=[];if(d[0]===e.left||d[1]===e.left)s.push('left');if(d[0]===e.right||d[1]===e.right)s.push('right');return s}function calculateLegal(){legalMap={};myHand.forEach(d=>legalMap[d.join('-')]=sidesFor(d))}function dominoElement(d,small,forceVertical=false){let dbl=d[0]===d[1],vertical=forceVertical||dbl,el=document.createElement('div');el.className='domino '+(vertical?'v':'h')+(small?' small':'');el.innerHTML=vertical?'<span>'+d[0]+'</span><span class="lineV"></span><span>'+d[1]+'</span>':'<span>'+d[0]+'</span><span class="lineH"></span><span>'+d[1]+'</span>';return el}function renderBoard(b){board.innerHTML='';if(!b.length){board.textContent='Waiting for first move';return}b.forEach(x=>board.appendChild(dominoElement(x.domino,true,false)))}function renderHand(){hand.innerHTML='';myHand.forEach(d=>{let el=dominoElement(d,false,true),s=legalMap[d.join('-')]||[];el.draggable=s.length>0;el.classList.add(s.length?'playable':'blocked');el.onclick=()=>attempt(d);el.ondragstart=e=>e.dataTransfer.setData('text/plain',JSON.stringify(d));hand.appendChild(el)})}function attempt(d){if(!roomState||roomState.turn!==myId)return msg('Not your turn');let s=sidesFor(d);if(!s.length)return msg('This piece cannot be played');if(s.length===1)play(d,s[0]);else{pending=d;choices.classList.remove('hidden')}}function play(d,side){socket.emit('playDomino',{code:currentRoom,domino:d,side})}function placeChosen(side){choices.classList.add('hidden');play(pending,side)}function setupDrop(el,side){el.ondragover=e=>{e.preventDefault();el.classList.add('over')};el.ondragleave=()=>el.classList.remove('over');el.ondrop=e=>{e.preventDefault();el.classList.remove('over');let d=JSON.parse(e.dataTransfer.getData('text/plain'));if(!sidesFor(d).includes(side)&&!sidesFor(d).includes('start'))return msg('Cannot place there');play(d,sidesFor(d).includes('start')?'start':side)}}setupDrop(leftDrop,'left');setupDrop(rightDrop,'right');function startGame(){socket.emit('startGame',currentRoom)}function quitGame(){socket.emit('quitGame',currentRoom);localStorage.removeItem('dominoCode');location.reload()}</script></body></html>
