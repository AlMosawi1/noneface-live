<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Domino | noneface.live</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-deep: #071428;
      --bg-mid: #0e2748;
      --panel: #143a6e;
      --panel-light: #1f4d8c;
      --accent: #3aa0ff;
      --accent-soft: rgba(58, 160, 255, 0.25);
      --text: #f2f7ff;
      --muted: #8aa4c8;
      --good: #3ecf8e;
      --warn: #ffd447;
      --tile: #fdfdfd;
      --tile-board: #ffffff;
      --tile-hand-muted: #5a677a;
      --tile-edge: #c8d4e6;
      --divider: rgba(0, 0, 0, 0.12);
      --danger: #ff6b7a;
      /* Each half is square → full tile is 2:1 (length : width) */
      --domino-half: min(10.5vw, 34px);
      --domino-radius: min(18px, 5.2vw);
      --pip-size: clamp(4px, 1.25vw, 6px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(120% 80% at 50% 0%, var(--bg-mid), var(--bg-deep));
      color: var(--text);
      overflow-x: hidden;
    }
    a { color: var(--accent); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 10px;
    }
    .topbar a, .topbar button {
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .scoreboard {
      display: flex;
      gap: 10px;
      flex: 1;
      justify-content: center;
      flex-wrap: wrap;
    }
    .score-pill {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel-light), var(--panel));
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .score-pill .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .score-pill .nums { font-size: 1.45rem; font-weight: 800; margin-top: 2px; }
    .score-pill .nums span { color: var(--warn); }
    .lobby {
      max-width: 420px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .lobby h1 { font-size: 1.6rem; margin: 0 0 12px; }
    .field { margin: 10px 0; }
    .field label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: var(--text);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent), #1e6fd0);
      color: #041018;
    }
    .btn.secondary { background: var(--panel-light); color: var(--text); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .room-code { font-size: 1.4rem; letter-spacing: 0.2em; text-align: center; margin: 12px 0; }
    .players { font-size: 0.9rem; color: var(--muted); }
    #gameRoot { display: none; flex-direction: column; height: 100vh; padding-bottom: 8px; }
    #gameRoot.active { display: flex; }
    .opponents {
      padding: 8px 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .opp {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
    .board-row {
      flex: 1;
      display: flex;
      gap: 8px;
      padding: 0 10px;
      min-height: 0;
      align-items: stretch;
    }
    .frame-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .frame-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; padding-left: 4px; }
    .frame {
      flex: 1;
      min-height: 220px;
      max-height: min(52vh, 560px);
      background: linear-gradient(180deg, #4a8fd4, #2e6bb5);
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 0 32px rgba(0,0,0,0.12);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame-table {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 8px;
      padding: 10px;
      min-height: 0;
    }
    .drop-slot {
      flex: 0 0 44px;
      align-self: stretch;
      max-height: 100%;
      min-height: 72px;
      border: 2px dashed rgba(58, 160, 255, 0.5);
      border-radius: 14px;
      background: rgba(58, 160, 255, 0.14);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease;
    }
    .drop-slot.active {
      opacity: 1;
      pointer-events: auto;
      box-shadow: 0 0 0 2px var(--accent), 0 0 22px rgba(58, 160, 255, 0.35);
    }
    .drop-slot:active { transform: scale(0.97); }
    .chain-scale {
      transform-origin: center center;
      transition: transform 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }
    .chain {
      position: relative;
      flex: 1;
      min-width: 120px;
      min-height: 120px;
    }
    .bone-col {
      width: 56px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .bone-col .cap { font-size: 0.65rem; color: var(--muted); text-align: center; }
    .bone-stack {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 2px;
      overflow: hidden;
      justify-content: flex-start;
    }
    .bone-tile {
      width: 36px;
      height: 18px;
      border-radius: 4px;
      background: linear-gradient(180deg, #5b7aaf, #3a5588);
      border: 1px solid rgba(255,255,255,0.25);
      flex-shrink: 0;
    }
    .domino {
      display: flex;
      background: var(--tile-board);
      border-radius: var(--domino-radius);
      border: none;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.22), 0 1px 0 rgba(255, 255, 255, 0.85) inset;
      overflow: hidden;
      flex-shrink: 0;
    }
    .domino.hand-muted {
      background: var(--tile-hand-muted);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }
    .domino.hand-muted .pip { background: #0a0a0a; }
    .domino .half {
      width: var(--domino-half);
      height: var(--domino-half);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 4px;
      gap: 2px;
    }
    .domino .half:first-child { border-right: 1px solid var(--divider); }
    .pip { width: var(--pip-size); height: var(--pip-size); border-radius: 50%; background: #0a0a0a; align-self: center; justify-self: center; }
    .hand-wrap {
      padding: 10px 12px 14px;
      background: linear-gradient(0deg, rgba(0,0,0,0.35), transparent);
    }
    .hand-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .hand {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
    }
    .hand .domino { cursor: pointer; transform: rotate(90deg); transform-origin: center center; }
    .hand .domino.selected { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: var(--domino-radius); }
    .hand .domino.unplayable { opacity: 0.72; filter: saturate(0.85); }
    /* Board snake: positioned by JS (see renderBoard); rotation encodes parallel vs perpendicular to arm */
    .chain .domino.board-tile {
      position: absolute;
      transform-origin: center center;
      transition: transform 0.22s ease, left 0.2s ease, top 0.2s ease;
      margin: 0;
      z-index: 1;
    }
    .chain .domino.board-tile.orient-along {
      transform: rotate(0deg);
    }
    .chain .domino.board-tile.orient-cross {
      transform: rotate(90deg);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 6px 10px;
    }
    .toolbar button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: var(--panel);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }
    .toolbar button.primary { background: var(--accent-soft); border-color: var(--accent); }
    .status { text-align: center; min-height: 22px; font-size: 0.9rem; color: var(--muted); padding: 4px; }
    .vote-panel {
      margin: 8px 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 212, 71, 0.12);
      border: 1px solid rgba(255, 212, 71, 0.35);
    }
    .vote-panel h3 { margin: 0 0 8px; font-size: 1rem; }
    .vote-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-bg.show { display: flex; }
    .modal { background: var(--panel); padding: 20px; border-radius: 16px; max-width: 360px; text-align: center; }
    .tile-fly-hide { opacity: 0 !important; transition: opacity 0.15s ease; }
    #flyLayer { position: fixed; inset: 0; pointer-events: none; z-index: 10000; }
  </style>
</head>
<body>
  <div class="topbar" id="topbar" style="display:none">
    <a href="../index.html">← Home</a>
    <div class="scoreboard" id="scoreboard"></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="roomBadge" style="font-size:0.75rem;color:var(--muted);letter-spacing:0.12em"></span>
      <button type="button" id="btnPass" style="display:none">Pass</button>
    </div>
  </div>

  <div class="lobby" id="lobby">
    <h1>Realtime Domino</h1>
    <p style="margin:0 0 14px;font-size:0.9rem"><a href="offline.html">Play offline</a> — no account or server; vs computer or hot seat on one device.</p>
    <div class="field">
      <label>Your name</label>
      <input id="playerName" type="text" maxlength="24" placeholder="Display name" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Mode</label>
        <select id="hostMode">
          <option value="1v1">1v1</option>
          <option value="2v2">2v2</option>
        </select>
      </div>
      <div class="field">
        <label>Loss cap (first team here loses)</label>
        <input id="targetScore" type="number" min="1" value="100" />
      </div>
    </div>
    <div class="field">
      <label>Starting entry (opponent pips after go-out or blocked round must be ≥ this to add loss points)</label>
      <input id="entryScore" type="number" min="0" value="21" />
    </div>
    <button class="btn" id="btnHost">Host game</button>
    <hr style="border-color:rgba(255,255,255,0.1);margin:18px 0" />
    <div class="field">
      <label>Room code</label>
      <input id="joinCode" type="text" maxlength="6" placeholder="ABC123" style="text-transform:uppercase" />
    </div>
    <button class="btn secondary" id="btnJoin">Join game</button>
    <div class="status" id="lobbyStatus"></div>
  </div>

  <div id="gameRoot">
    <div class="opponents" id="opponents"></div>
    <div class="board-row">
      <div class="frame-wrap">
        <div class="frame-label">Table</div>
        <div class="frame" id="frame">
          <div class="frame-table" id="frameTable">
            <button type="button" class="drop-slot drop-left" id="dropLeft" aria-label="Play on left" hidden></button>
            <div class="chain-scale" id="chainScale">
              <div class="chain" id="chain"></div>
            </div>
            <button type="button" class="drop-slot drop-right" id="dropRight" aria-label="Play on right" hidden></button>
          </div>
        </div>
      </div>
      <aside class="bone-col" aria-label="Boneyard">
        <div class="cap">Boneyard</div>
        <div class="bone-stack" id="boneStack"></div>
        <div class="cap" id="boneCount">0</div>
      </aside>
    </div>
    <div class="status" id="roundMsg"></div>
    <div class="vote-panel" id="votePanel" style="display:none">
      <h3 id="voteTitle">Redraw vote</h3>
      <p id="voteText" style="margin:0 0 10px;color:var(--muted);font-size:0.9rem;"></p>
      <div class="vote-actions" id="voteActions"></div>
    </div>
    <div class="toolbar" id="toolbar"></div>
    <div class="hand-wrap">
      <div class="hand-title">Your hand — tap a tile to play</div>
      <div class="hand" id="hand"></div>
    </div>
    <div class="status" id="gameStatus"></div>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Game over</h2>
      <p id="modalBody"></p>
      <button class="btn" id="modalClose" style="margin-top:12px">OK</button>
    </div>
  </div>

  <div id="flyLayer" aria-hidden="true"></div>

  <script>
    /** Socket.IO API base URL (production). */
    const DOMINO_SOCKET_URL = 'https://noneface-domino.onrender.com';

    const PIP_CELLS = {
      0: [],
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8],
    };
    function halfEl(n) {
      const g = document.createElement('div');
      g.className = 'half';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        if ((PIP_CELLS[n] || []).includes(i)) {
          const p = document.createElement('div');
          p.className = 'pip';
          cell.appendChild(p);
        }
        g.appendChild(cell);
      }
      return g;
    }
    function dominoEl(a, b) {
      const d = document.createElement('div');
      d.className = 'domino';
      d.appendChild(halfEl(a));
      d.appendChild(halfEl(b));
      return d;
    }

    function isDoubleDomino(d) {
      return d && d[0] === d[1];
    }

    const rotFwdCW = (f) => [f[1], -f[0]];
    const rotFwdCCW = (f) => [-f[1], f[0]];

    /**
     * Incoming unit vector — direction from tile i-1 toward tile i along the snake (toward rising index).
     * First tile uses the same axis as outgoing for symmetry.
     * Returns CSS class: along = DOM wide; cross = rotate 90°.
     */
    function orientAlongCrossFromIncoming(incoming, isDouble) {
      const horiz = incoming[0] !== 0;
      if (!isDouble) return horiz ? 'along' : 'cross';
      return horiz ? 'cross' : 'along';
    }

    /** AABB corners in units (half width = 1 long = 2) for occupancy tests. */
    function tileCornersUnit(cx, cy, forward, isDouble) {
      const [fx, fy] = forward;
      const px = -fy;
      const py = fx;
      const corners = [];
      if (!isDouble) {
        for (const sf of [-1, 1]) {
          for (const sp of [-0.5, 0.5]) {
            corners.push([cx + sf * fx + sp * px, cy + sf * fy + sp * py]);
          }
        }
      } else {
        for (const sp of [-1, 1]) {
          for (const sf of [-0.5, 0.5]) {
            corners.push([cx + sp * px + sf * fx, cy + sp * py + sf * fy]);
          }
        }
      }
      return corners;
    }

    function bboxUnit(layout) {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      for (const t of layout) {
        for (const [x, y] of tileCornersUnit(t.cx, t.cy, t.forward, t.isDouble)) {
          minX = Math.min(minX, x);
          minY = Math.min(minY, y);
          maxX = Math.max(maxX, x);
          maxY = Math.max(maxY, y);
        }
      }
      return { minX, minY, maxX, maxY };
    }

    function bboxFits(b, maxW, maxH, pad) {
      const w = b.maxX - b.minX;
      const h = b.maxY - b.minY;
      return w <= maxW - pad * 2 && h <= maxH - pad * 2;
    }

    /**
     * 2D snake: non-doubles align with inbound arm; doubles perpendicular.
     * Tries cardinal seeds and 90° turns when the bbox would overflow the table.
     * Half-module units (short half width = 1, center step = 2).
     */
    function computeSnakeLayout(board, maxUnitsW, maxUnitsH, padUnits) {
      if (!board || !board.length) return [];
      const pad = padUnits ?? 1.75;
      const limW = Math.max(maxUnitsW || 999, pad * 2 + 4);
      const limH = Math.max(maxUnitsH || 999, pad * 2 + 4);

      /** `toNext[i]` = unit vector from tile i center to tile i+1 center. */
      function build(seedToNext) {
        const rows = [];
        let toNext = [...seedToNext];
        let cx = 0;
        let cy = 0;
        for (let i = 0; i < board.length; i++) {
          const isD = isDoubleDomino(board[i].domino);
          const axisForOrient = i === 0 ? toNext : rows[i - 1].toNext;
          rows.push({ cx, cy, toNext: [...toNext], isDouble: isD, orient: orientAlongCrossFromIncoming(axisForOrient, isD) });
          if (i === board.length - 1) break;

          const trySeg = (seg) => {
            const nx = cx + seg[0] * 2;
            const ny = cy + seg[1] * 2;
            const cand = rows.slice(0, -1);
            const lastUpdated = { ...rows[rows.length - 1], toNext: [...seg] };
            cand.push(lastUpdated);
            const isDn = isDoubleDomino(board[i + 1].domino);
            cand.push({
              cx: nx,
              cy: ny,
              toNext: [...seg],
              isDouble: isDn,
              orient: orientAlongCrossFromIncoming(seg, isDn),
            });
            const bb2 = bboxUnit(
              cand.map((t, j) => ({
                cx: t.cx,
                cy: t.cy,
                forward: j === 0 ? t.toNext : cand[j - 1].toNext,
                isDouble: t.isDouble,
              })),
            );
            return { nx, ny, seg, ok: bboxFits(bb2, limW, limH, pad) };
          };

          let best = trySeg(toNext);
          if (!best.ok) {
            const t1 = trySeg(rotFwdCW(toNext));
            const t2 = trySeg(rotFwdCCW(toNext));
            if (t1.ok) best = t1;
            else if (t2.ok) best = t2;
            else best = t1;
          }
          rows[rows.length - 1].toNext = [...best.seg];
          cx = best.nx;
          cy = best.ny;
          toNext = best.seg;
        }
        const list = rows.map(({ cx: x, cy: y, orient: o }) => ({ cx: x, cy: y, orient: o }));
        list._bbox = bboxUnit(
          rows.map((t, j) => ({
            cx: t.cx,
            cy: t.cy,
            forward: j === 0 ? t.toNext : rows[j - 1].toNext,
            isDouble: t.isDouble,
          })),
        );
        return list;
      }

      const candidates = [build([1, 0]), build([-1, 0]), build([0, 1]), build([0, -1])];
      let bestLayout = candidates[0].map((tile) => ({ cx: tile.cx, cy: tile.cy, orient: tile.orient }));
      let bestScore = Infinity;
      for (const L of candidates) {
        const b = L._bbox;
        const area = (b.maxX - b.minX) * (b.maxY - b.minY);
        const fits = bboxFits(b, limW, limH, pad);
        const score = fits ? area : area + 1e6;
        if (score < bestScore) {
          bestScore = score;
          bestLayout = L.map((tile) => ({ cx: tile.cx, cy: tile.cy, orient: tile.orient }));
        }
      }
      return bestLayout;
    }

    const qs = (s) => document.querySelector(s);

    const socket = io(DOMINO_SOCKET_URL, { transports: ['websocket', 'polling'] });
    let pid = null;
    let code = null;
    let room = null;
    let hand = [];
    let selected = null;
    let legalSides = [];
    let legalResolved = false;
    let lastHandTileEl = null;
    /** @type {{ fromRect: DOMRect, side: string, prevLen: number, a: number, b: number } | null} */
    let pendingFly = null;
    /** Placements `{ cx, cy, orient }` matching last rendered board — used after `renderBoard`. */
    let lastSnakeLayout = [];

    /** Measure one domino-half in px inside `host` without leaving visible debris. */
    function snakeTileBoundsUx(cx, cy, isDouble, orient) {
      if (!isDouble && orient === 'along')
        return { mnX: cx - 1, mxX: cx + 1, mnY: cy - 0.5, mxY: cy + 0.5 };
      if (!isDouble && orient === 'cross')
        return { mnX: cx - 0.5, mxX: cx + 0.5, mnY: cy - 1, mxY: cy + 1 };
      if (isDouble && orient === 'cross')
        return { mnX: cx - 0.5, mxX: cx + 0.5, mnY: cy - 1, mxY: cy + 1 };
      return { mnX: cx - 1, mxX: cx + 1, mnY: cy - 0.5, mxY: cy + 0.5 };
    }

    function measureHalfPx(host) {
      const probe = dominoEl(6, 6);
      probe.setAttribute('aria-hidden', 'true');
      probe.style.cssText =
        'position:absolute;visibility:hidden;left:-9999px;top:0;pointer-events:none;margin:0;';
      host.appendChild(probe);
      const w = probe.querySelector('.half')?.getBoundingClientRect().width || 34;
      probe.remove();
      return w;
    }

    const dropLeft = () => qs('#dropLeft');
    const dropRight = () => qs('#dropRight');

    function hideDropZones() {
      const L = dropLeft();
      const R = dropRight();
      L.hidden = true;
      R.hidden = true;
      L.classList.remove('active');
      R.classList.remove('active');
    }

    function updateDropZones() {
      const L = dropLeft();
      const R = dropRight();
      hideDropZones();
      if (!room || room.turn !== socket.id || room.gamePhase !== 'play' || !selected || !legalResolved) return;
      const sides = legalSides;
      if (sides.includes('left')) {
        L.hidden = false;
        L.classList.add('active');
      }
      if (sides.includes('right')) {
        R.hidden = false;
        R.classList.add('active');
      }
    }

    function clearPlaySelection() {
      selected = null;
      legalSides = [];
      legalResolved = false;
      lastHandTileEl = null;
      hideDropZones();
    }

    function playFromHand(side, fromEl) {
      if (!room || !selected) return;
      const raw = fromEl || lastHandTileEl;
      const fr = raw && raw.getBoundingClientRect ? raw.getBoundingClientRect() : null;
      const prevLen = room.board ? room.board.length : 0;
      const [a, b] = selected;
      if (fr && fr.width > 0) pendingFly = { fromRect: fr, side, prevLen, a, b };
      else pendingFly = null;
      socket.emit('playDomino', { code: room.code, domino: selected, side });
      clearPlaySelection();
      renderHand();
    }

    function runTileFlyAnimation(fromRect, targetEl, a, b, boardOrient, done) {
      const layer = qs('#flyLayer');
      const ghost = dominoEl(a, b);
      if (boardOrient === 'along' || boardOrient === 'cross') {
        ghost.classList.add('board-tile', boardOrient === 'along' ? 'orient-along' : 'orient-cross');
      }
      ghost.style.position = 'fixed';
      ghost.style.left = `${fromRect.left}px`;
      ghost.style.top = `${fromRect.top}px`;
      ghost.style.width = `${fromRect.width}px`;
      ghost.style.height = `${fromRect.height}px`;
      ghost.style.zIndex = '10001';
      ghost.style.margin = '0';
      ghost.style.pointerEvents = 'none';
      ghost.style.boxSizing = 'border-box';
      layer.appendChild(ghost);
      const tr = targetEl.getBoundingClientRect();
      const anim = ghost.animate(
        [
          {
            left: `${fromRect.left}px`,
            top: `${fromRect.top}px`,
            width: `${fromRect.width}px`,
            height: `${fromRect.height}px`,
          },
          {
            left: `${tr.left}px`,
            top: `${tr.top}px`,
            width: `${tr.width}px`,
            height: `${tr.height}px`,
          },
        ],
        { duration: 420, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }
      );
      anim.onfinish = () => {
        ghost.remove();
        if (typeof done === 'function') done();
      };
    }

    socket.on('connect', () => { setStatus('Connected.'); });
    socket.on('connect_error', () => { setStatus('Cannot reach game server. Try again later.'); });
    socket.on('errorMessage', (m) => { setStatus(m); qs('#gameStatus').textContent = m; });
    socket.on('session', (s) => { pid = s.pid; code = s.code; });
    socket.on('roomJoined', (r) => {
      const prevLen = room && room.board ? room.board.length : 0;
      onRoom(r);
      maybeFlyPlacedTile(prevLen);
    });
    socket.on('roomUpdated', (r) => {
      const prevLen = room && room.board ? room.board.length : 0;
      onRoom(r);
      maybeFlyPlacedTile(prevLen);
    });
    socket.on('gameStarted', (p) => {
      const prevLen = room && room.board ? room.board.length : 0;
      onRoom(p.room);
      maybeFlyPlacedTile(prevLen);
      enterGame();
    });
    socket.on('yourHand', (h) => { hand = h; renderHand(); });
    socket.on('boardUpdated', (p) => {
      const prevLen = room && room.board ? room.board.length : 0;
      onRoom(p.room);
      maybeFlyPlacedTile(prevLen);
    });
    socket.on('legalSides', (p) => {
      if (!selected || !p.domino || !sameDom(selected, p.domino)) return;
      legalSides = p.sides || [];
      legalResolved = true;
      if (legalSides.length === 1) {
        playFromHand(legalSides[0], lastHandTileEl);
        return;
      }
      const canL = legalSides.includes('left');
      const canR = legalSides.includes('right');
      if (canL && canR) {
        renderHand();
        updateDropZones();
        return;
      }
      renderHand();
      updateDropZones();
    });
    socket.on('gameWon', (d) => showModal('Game over', `${d.winnerName} — ${d.reason || ''}`));
    socket.on('roundMessage', (d) => { qs('#roundMsg').textContent = d.text || ''; });
    socket.on('kicked', () => showModal('Removed', 'You were kicked from the room.'));
    socket.on('banned', () => showModal('Banned', 'You are banned from this room.'));
    socket.on('autoDrew', () => { /* silent */ });

    function setStatus(t) { qs('#lobbyStatus').textContent = t || ''; }

    function onRoom(r) {
      room = r;
      if (!r) return;
      if (r.code) code = r.code;
      if (r.started && r.gamePhase === 'play' && r.turn !== socket.id) clearPlaySelection();
      if (r.started) enterGame();
      qs('#roomBadge').textContent = r.code || '';
      renderLobbyRoom();
      renderScoreboard();
      renderBoard();
      renderBoneyard();
      renderOpponents();
      renderToolbar();
      renderVote();
      renderHand();
      updateDropZones();
      if (r.started && r.gamePhase === 'play' && r.turn === socket.id) {
        qs('#btnPass').style.display = 'inline-block';
      } else {
        qs('#btnPass').style.display = 'none';
      }
    }

    function enterGame() {
      qs('#roomPanel')?.remove();
      qs('#lobby').style.display = 'none';
      qs('#gameRoot').classList.add('active');
      qs('#topbar').style.display = 'flex';
    }

    function renderLobbyRoom() {
      if (!room || room.started) return;
      const hostControls = room.players?.find((p) => p.pid === pid && p.host);
      let html = `<div class="room-code">${room.code}</div><div class="players">`;
      room.players.forEach((p) => {
        html += `<div>${p.name} ${p.host ? '(host)' : ''} · team ${p.team} ${p.connected === false ? '· offline' : ''}</div>`;
      });
      html += `</div>`;
      if (hostControls) {
        html += `<div class="field"><label>Loss cap</label><input type="number" id="hostTarget" value="${room.targetScore}" min="1"/></div>`;
        html += `<div class="field"><label>Entry score</label><input type="number" id="hostEntry" value="${room.entryScore}" min="0"/></div>`;
        html += `<div class="field"><label>Mode</label><select id="hostModeRoom"><option value="1v1">1v1</option><option value="2v2">2v2</option></select></div>`;
        html += `<button class="btn" id="btnSaveHost">Save settings</button>`;
        html += `<button class="btn" id="btnStart" ${room.players.length < (room.mode === '2v2' ? 4 : 2) ? 'disabled' : ''}>Start game</button>`;
      }
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      const existing = qs('#roomPanel');
      if (existing) existing.remove();
      wrap.id = 'roomPanel';
      qs('#lobby').appendChild(wrap);
      if (hostControls) {
        qs('#hostModeRoom').value = room.mode;
        qs('#btnSaveHost').onclick = () => {
          socket.emit('updateRoomSettings', {
            code: room.code,
            targetScore: +qs('#hostTarget').value,
            entryScore: +qs('#hostEntry').value,
            mode: qs('#hostModeRoom').value,
          });
        };
        qs('#btnStart').onclick = () => socket.emit('startGame', room.code);
      }
    }

    function renderScoreboard() {
      if (!room || !room.started) {
        qs('#scoreboard').innerHTML = '';
        return;
      }
      const t = room.targetScore || 100;
      const e1 = room.teamLoss?.[1] ?? 0;
      const e2 = room.teamLoss?.[2] ?? 0;
      qs('#scoreboard').innerHTML = `
        <div class="score-pill"><div class="label">Team 1 · loss pts</div><div class="nums">${e1}<span>/${t}</span></div></div>
        <div class="score-pill"><div class="label">Team 2 · loss pts</div><div class="nums">${e2}<span>/${t}</span></div></div>
      `;
    }

    function renderOpponents() {
      if (!room) return;
      const me = room.players.find((p) => p.pid === pid);
      const others = room.players.filter((p) => p.pid !== pid);
      qs('#opponents').innerHTML = others.map((p) => `
        <div class="opp"><span class="dot"></span><strong>${escapeHtml(p.name)}</strong> · T${p.team} · ${p.handCount} tiles</div>
      `).join('');
      if (me && room.turn) {
        const cur = room.players.find((p) => p.id === room.turn);
        qs('#gameStatus').textContent = cur && cur.pid === pid ? 'Your turn.' : `${cur ? escapeHtml(cur.name) : '…'}'s turn.`;
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function maybeFlyPlacedTile(prevBoardLen) {
      if (!pendingFly || !room || !room.board || room.board.length <= prevBoardLen) {
        pendingFly = null;
        return;
      }
      const ch = qs('#chain');
      if (!ch || !ch.children.length) {
        pendingFly = null;
        return;
      }
      const { fromRect, side, a, b } = pendingFly;
      let targetEl = null;
      if (side === 'left') targetEl = ch.firstElementChild;
      else targetEl = ch.lastElementChild;
      if (!targetEl || !fromRect || fromRect.width < 4) {
        pendingFly = null;
        return;
      }
      pendingFly = null;
      targetEl.classList.add('tile-fly-hide');
      const idx = side === 'left' ? 0 : room.board.length - 1;
      const pl = room.board[idx];
      let flyOrient =
        lastSnakeLayout[idx] && lastSnakeLayout[idx].orient ? lastSnakeLayout[idx].orient : 'along';
      if (pl) {
        const ok = (pl.domino[0] === a && pl.domino[1] === b) || (pl.domino[0] === b && pl.domino[1] === a);
        if (!ok) flyOrient = 'along';
      }
      requestAnimationFrame(() => {
        runTileFlyAnimation(fromRect, targetEl, a, b, flyOrient, () => {
          targetEl.classList.remove('tile-fly-hide');
        });
      });
    }

    function renderBoard() {
      const chain = qs('#chain');
      const frame = qs('#frame');
      const scaleEl = qs('#chainScale');
      chain.innerHTML = '';
      lastSnakeLayout = [];
      const padPxChain = 10;
      if (!room || !room.board || !room.board.length) {
        chain.style.width = '';
        chain.style.height = '';
        scaleEl.style.transform = 'scale(1)';
        requestAnimationFrame(() => updateDropZones());
        return;
      }
      const halfPx = measureHalfPx(chain);
      const scaleW = scaleEl.getBoundingClientRect().width || frame.clientWidth * 0.55;
      const fw = Math.max(scaleW - 24, 80);
      const fh = Math.max(frame.clientHeight - 40, 80);
      const hx = Math.max(halfPx, 8);
      const placements = computeSnakeLayout(room.board, fw / hx, fh / hx);
      lastSnakeLayout = placements.map((p) => ({ ...p }));

      let buMinX = Infinity;
      let buMinY = Infinity;
      let buMaxX = -Infinity;
      let buMaxY = -Infinity;
      placements.forEach((p, ix) => {
        const dbl = isDoubleDomino(room.board[ix].domino);
        const bx = snakeTileBoundsUx(p.cx, p.cy, dbl, p.orient);
        buMinX = Math.min(buMinX, bx.mnX);
        buMinY = Math.min(buMinY, bx.mnY);
        buMaxX = Math.max(buMaxX, bx.mxX);
        buMaxY = Math.max(buMaxY, bx.mxY);
      });

      const WaltPx = halfPx * 2;
      const HalPx = halfPx;

      placements.forEach((pl, idx) => {
        const [a, b] = room.board[idx].domino;
        const tile = dominoEl(a, b);
        tile.classList.add('board-tile');
        tile.classList.add(pl.orient === 'along' ? 'orient-along' : 'orient-cross');
        const cxPx = (pl.cx - buMinX) * halfPx + padPxChain;
        const cyPx = (pl.cy - buMinY) * halfPx + padPxChain;
        tile.style.left = `${cxPx - WaltPx / 2}px`;
        tile.style.top = `${cyPx - HalPx / 2}px`;
        chain.appendChild(tile);
      });

      const chainW = (buMaxX - buMinX) * halfPx + padPxChain * 2;
      const chainH = (buMaxY - buMinY) * halfPx + padPxChain * 2;
      chain.style.width = `${Math.max(chainW, 40)}px`;
      chain.style.height = `${Math.max(chainH, 40)}px`;

      requestAnimationFrame(() => {
        const cw = chain.offsetWidth || 1;
        const ch = chain.offsetHeight || 1;
        const innerW = Math.max(scaleEl.clientWidth - 20, 40);
        const innerH = Math.max(scaleEl.clientHeight - 20, 40);
        const s = Math.min(1, innerW / cw, innerH / ch, 1);
        scaleEl.style.transform = `scale(${s})`;
        updateDropZones();
      });
    }

    function renderBoneyard() {
      const n = room?.boneyardCount ?? 0;
      qs('#boneCount').textContent = String(n);
      const stack = qs('#boneStack');
      stack.innerHTML = '';
      const maxShow = 14;
      const show = Math.min(n, maxShow);
      for (let i = 0; i < show; i++) {
        stack.appendChild(document.createElement('div')).className = 'bone-tile';
      }
    }

    function renderToolbar() {
      qs('#toolbar').innerHTML = '';
    }

    function renderVote() {
      const panel = qs('#votePanel');
      if (!room || room.gamePhase !== 'redraw_vote' || !room.redrawVote) {
        panel.style.display = 'none';
        return;
      }
      panel.style.display = 'block';
      const rv = room.redrawVote;
      qs('#voteTitle').textContent = 'Five doubles — redraw?';
      qs('#voteText').textContent = `${escapeHtml(rv.subjectName || 'A player')} has five doubles. ${rv.neededAgrees} agreeing vote(s) reshuffle all tiles. They cannot vote.`;
      const actions = qs('#voteActions');
      actions.innerHTML = '';
      if (!rv.voterPids.includes(pid)) {
        if (rv.subjectPid === pid) {
          actions.textContent = 'Waiting for other players to vote.';
        }
        return;
      }
      const voted = rv.votes && rv.votes[pid] !== undefined;
      if (voted) {
        actions.textContent = 'You voted. Waiting for others…';
        return;
      }
      const yes = document.createElement('button');
      yes.className = 'btn';
      yes.textContent = 'Redraw';
      yes.onclick = () => socket.emit('redrawVote', { code: room.code, agree: true });
      const no = document.createElement('button');
      no.className = 'btn secondary';
      no.textContent = 'Keep deal';
      no.onclick = () => socket.emit('redrawVote', { code: room.code, agree: false });
      actions.appendChild(yes);
      actions.appendChild(no);
    }

    function renderHand() {
      const el = qs('#hand');
      el.innerHTML = '';
      if (!room || !room.started) return;
      const myTurn = room.turn === socket.id && room.gamePhase === 'play';
      hand.forEach((d) => {
        const node = dominoEl(d[0], d[1]);
        const handMuted =
          !myTurn ||
          (myTurn &&
            selected &&
            sameDom(selected, d) &&
            legalResolved &&
            legalSides.length === 0);
        if (handMuted) node.classList.add('hand-muted');
        if (selected && sameDom(selected, d)) node.classList.add('selected');
        if (myTurn && selected && sameDom(selected, d) && legalResolved && legalSides.length === 0)
          node.classList.add('unplayable');
        node.onclick = () => {
          if (room.turn !== socket.id || room.gamePhase !== 'play') return;
          selected = d;
          lastHandTileEl = node;
          legalSides = [];
          legalResolved = false;
          socket.emit('getLegalSides', { code: room.code, domino: d });
          renderHand();
        };
        el.appendChild(node);
      });
    }

    dropLeft().addEventListener('click', (ev) => {
      ev.preventDefault();
      if (room && room.turn === socket.id && selected && legalSides.includes('left')) playFromHand('left', lastHandTileEl);
    });
    dropRight().addEventListener('click', (ev) => {
      ev.preventDefault();
      if (room && room.turn === socket.id && selected && legalSides.includes('right')) playFromHand('right', lastHandTileEl);
    });

    function sameDom(a, b) {
      return a && b && ((a[0] === b[0] && a[1] === b[1]) || (a[0] === b[1] && a[1] === b[0]));
    }

    function showModal(title, body) {
      qs('#modalTitle').textContent = title;
      qs('#modalBody').textContent = body;
      qs('#modal').classList.add('show');
    }
    qs('#modalClose').onclick = () => {
      qs('#modal').classList.remove('show');
      location.reload();
    };

    qs('#btnHost').onclick = () => {
      const name = (qs('#playerName').value || 'Host').trim();
      socket.emit('hostGame', {
        name,
        mode: qs('#hostMode').value,
        targetScore: +qs('#targetScore').value,
        entryScore: +qs('#entryScore').value,
      });
    };
    qs('#btnJoin').onclick = () => {
      const name = (qs('#playerName').value || 'Player').trim();
      const c = (qs('#joinCode').value || '').trim().toUpperCase();
      if (c.length !== 6) return setStatus('Enter a 6-character code.');
      socket.once('session', () => {});
      socket.emit('joinGame', { code: c, name });
    };

    qs('#btnPass').onclick = () => {
      if (room && socket) socket.emit('passTurn', { code: room.code });
    };

    window.addEventListener('resize', () => renderBoard());
  </script>
</body>
</html>
