<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Domino Multiplayer</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#111;color:white;padding:20px}body.light{background:#f4f4f4;color:#111}.wrap{max-width:1100px;margin:auto}.top{display:flex;justify-content:space-between;margin-bottom:20px}button,input,select,a{padding:10px 12px;border-radius:10px;border:1px solid #555;background:#222;color:white;margin:4px;text-decoration:none}body.light button,body.light input,body.light select,body.light a{background:white;color:#111}.card{border:1px solid #555;border-radius:14px;padding:16px;margin:12px 0;background:rgba(255,255,255,.06)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.hidden{display:none}.roomCode{text-align:center;font-size:32px;letter-spacing:5px}.players{display:grid;gap:8px}.player{display:flex;justify-content:space-between;border:1px solid #555;border-radius:10px;padding:8px}.boardWrap{overflow-x:auto}.board{display:flex;gap:10px;min-width:max-content;min-height:150px;align-items:center}.hand{display:flex;gap:10px;flex-wrap:wrap}.domino{border:2px solid currentColor;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;background:rgba(255,255,255,.08)}.v{width:54px;height:100px;flex-direction:column}.h{width:100px;height:54px;flex-direction:row}.small.v{width:42px;height:78px}.small.h{width:78px;height:42px}.lineV{width:80%;height:2px;background:currentColor}.lineH{width:2px;height:80%;background:currentColor}.status{text-align:center;font-weight:bold;margin-top:10px}.danger{border-color:#ff4757}.choices{text-align:center}
</style>
</head>
<body>
<main class="wrap">
<div class="top"><a href="../index.html">Home</a><button onclick="toggleTheme()">Light/Dark</button></div>
<h1>Domino Multiplayer</h1>
<section id="menu" class="grid"><div class="card"><h2>Host a Game</h2><input id="hostName" placeholder="Display name"><select id="mode"><option value="1v1">1v1</option><option value="2v2">2v2</option></select><input id="entryScore" type="number" value="21"><input id="targetScore" type="number" value="100"><button onclick="hostGame()">Host Game</button></div><div class="card"><h2>Join a Game</h2><input id="joinName" placeholder="Display name"><input id="joinCode" maxlength="6" placeholder="Room code"><button onclick="joinGame()">Join Game</button></div></section>
<section id="room" class="hidden"><div class="card"><div id="roomCode" class="roomCode">------</div><p id="info"></p><button id="startBtn" onclick="startGame()">Start Game</button><button class="danger" onclick="quitGame()">Quit Game</button></div><div class="grid"><div class="card"><h2>Players</h2><div id="players" class="players"></div></div><div class="card"><h2>Board</h2><div class="boardWrap"><div id="board" class="board"></div></div></div></div><div class="card"><h2>Your Hand</h2><div id="hand" class="hand"></div><div id="choices" class="choices hidden"><button onclick="placeChosen('left')">Place Left</button><button onclick="placeChosen('right')">Place Right</button></div></div></section><div id="status" class="status"></div>
</main>
<script>
const BACKEND="https://noneface-domino.onrender.com";let socket=io(BACKEND,{transports:['websocket','polling']});let myId=null,currentRoom=null,roomState=null,myHand=[],pending=null;function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark')}if(localStorage.getItem('theme')==='light')document.body.classList.add('light');function msg(text){document.getElementById('status').textContent=text}socket.on('connect',()=>{myId=socket.id;msg('Connected')});socket.on('roomJoined',showRoom);socket.on('roomUpdated',showRoom);socket.on('gameStarted',data=>showRoom(data.room));socket.on('yourHand',hand=>{myHand=hand;renderHand()});socket.on('boardUpdated',data=>showRoom(data.room));socket.on('legalSides',data=>{if(!data.sides.length)return msg('Illegal move');if(data.sides.length===1){socket.emit('playDomino',{code:currentRoom,domino:data.domino,side:data.sides[0]})}else{pending=data.domino;document.getElementById('choices').classList.remove('hidden')}});socket.on('gameWon',data=>{alert('Winner: '+data.winnerName+'\nReason: '+data.reason);msg('Winner: '+data.winnerName)});socket.on('errorMessage',msg);socket.on('kicked',()=>{alert('You were kicked');location.reload()});socket.on('banned',()=>{alert('You were banned');location.reload()});function hostGame(){socket.emit('hostGame',{name:document.getElementById('hostName').value||'Host',mode:document.getElementById('mode').value,entryScore:+document.getElementById('entryScore').value||21,targetScore:+document.getElementById('targetScore').value||100})}function joinGame(){socket.emit('joinGame',{name:document.getElementById('joinName').value||'Player',code:document.getElementById('joinCode').value.trim().toUpperCase()})}function showRoom(roomData){roomState=roomData;currentRoom=roomData.code;document.getElementById('menu').classList.add('hidden');document.getElementById('room').classList.remove('hidden');document.getElementById('roomCode').textContent=roomData.code;let turnPlayer=roomData.players.find(p=>p.id===roomData.turn);document.getElementById('info').textContent='Mode: '+roomData.mode+' | Players: '+roomData.players.length+'/'+roomData.neededPlayers+' | Turn: '+(turnPlayer?turnPlayer.name:'-');renderPlayers(roomData);renderBoard(roomData.board||[]);let amHost=roomData.players.some(p=>p.id===myId&&p.host);document.getElementById('startBtn').disabled=!amHost||roomData.started||roomData.players.length!==roomData.neededPlayers}function renderPlayers(roomData){let list=document.getElementById('players');list.innerHTML='';let amHost=roomData.players.some(p=>p.id===myId&&p.host);roomData.players.forEach(player=>{let div=document.createElement('div');div.className='player';div.innerHTML='<span>'+player.name+(player.host?' 👑':'')+' | Team '+player.team+' | '+player.handCount+'</span>';if(amHost&&!player.host&&!roomData.started){let kick=document.createElement('button');kick.textContent='Kick';kick.onclick=()=>socket.emit('kickPlayer',{code:roomData.code,playerId:player.id});let ban=document.createElement('button');ban.textContent='Ban';ban.className='danger';ban.onclick=()=>socket.emit('banPlayer',{code:roomData.code,playerId:player.id});div.append(kick,ban)}list.appendChild(div)})}function dominoElement(domino,small,forceVertical=false){let dbl=domino[0]===domino[1];let vertical=forceVertical||dbl;let div=document.createElement('div');div.className='domino '+(vertical?'v':'h')+(small?' small':'');div.innerHTML=vertical?'<span>'+domino[0]+'</span><span class="lineV"></span><span>'+domino[1]+'</span>':'<span>'+domino[0]+'</span><span class="lineH"></span><span>'+domino[1]+'</span>';return div}function renderBoard(boardData){const boardDiv=document.getElementById('board');boardDiv.innerHTML='';if(!boardData.length){boardDiv.textContent='Waiting for first move';return}boardData.forEach(item=>boardDiv.appendChild(dominoElement(item.domino,true,false)))}function renderHand(){let handDiv=document.getElementById('hand');handDiv.innerHTML='';myHand.forEach(domino=>{let div=dominoElement(domino,false,true);div.onclick=()=>attempt(domino);handDiv.appendChild(div)})}function attempt(domino){if(!roomState||roomState.turn!==myId)return msg('Not your turn');socket.emit('getLegalSides',{code:currentRoom,domino})}function placeChosen(side){document.getElementById('choices').classList.add('hidden');socket.emit('playDomino',{code:currentRoom,domino:pending,side})}function startGame(){socket.emit('startGame',currentRoom)}function quitGame(){socket.emit('quitGame',currentRoom);location.reload()}
</script>
</body>
</html>
