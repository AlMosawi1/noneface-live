<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X/O | noneface.live</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2e2e2e, #0d0d0d 65%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .wrap { max-width: 700px; width: 100%; text-align: center; }
    h1 { font-size: clamp(2.5rem, 8vw, 4.8rem); margin-bottom: 8px; }
    p { color: #d0d0d0; line-height: 1.6; }
    .top { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .link {
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.2);
      padding: 10px 14px;
      border-radius: 10px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 22px 0;
    }
    button, select {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 1rem;
    }
    button:hover { background: white; color: black; cursor: pointer; }
    select option { color: black; }
    .board {
      width: min(92vw, 420px);
      height: min(92vw, 420px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .cell {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(3rem, 10vw, 5rem);
      cursor: pointer;
      user-select: none;
      aspect-ratio: 1;
      transition: .2s ease;
    }
    .cell:hover { background: rgba(255,255,255,.15); }
    .status { margin-top: 18px; font-size: 1.2rem; font-weight: bold; min-height: 28px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <a class="link" href="../index.html">← Home</a>
      <a class="link" href="sudoku.html">Sudoku</a>
    </div>

    <h1>X / O</h1>
    <p>Choose your side and difficulty. Impossible mode uses perfect play and will never lose.</p>

    <div class="controls">
      <select id="difficulty">
        <option value="random">Random</option>
        <option value="impossible">Impossible</option>
      </select>

      <select id="playerSymbol">
        <option value="X">Play as X</option>
        <option value="O">Play as O</option>
      </select>

      <button onclick="startGame()">New Game</button>
    </div>

    <div class="board" id="board"></div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const difficultyEl = document.getElementById('difficulty');
    const playerSymbolEl = document.getElementById('playerSymbol');

    let board = ['', '', '', '', '', '', '', '', ''];
    let player = 'X';
    let ai = 'O';
    let gameOver = false;

    const winCombos = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function render() {
      boardEl.innerHTML = '';
      board.forEach((value, index) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = value;
        cell.onclick = () => handleMove(index);
        boardEl.appendChild(cell);
      });
    }

    function startGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      gameOver = false;
      player = playerSymbolEl.value;
      ai = player === 'X' ? 'O' : 'X';
      statusEl.textContent = `${player}'s turn`;
      render();

      if (ai === 'X') {
        setTimeout(aiMove, 350);
      }
    }

    function handleMove(index) {
      if (gameOver || board[index] !== '') return;
      board[index] = player;
      render();

      if (checkWinner(board, player)) {
        statusEl.textContent = 'You win!';
        gameOver = true;
        return;
      }

      if (isDraw()) {
        statusEl.textContent = 'Draw!';
        gameOver = true;
        return;
      }

      statusEl.textContent = 'AI thinking...';
      setTimeout(aiMove, 350);
    }

    function aiMove() {
      if (gameOver) return;

      let move;

      if (difficultyEl.value === 'random') {
        const empty = board.map((v,i) => v === '' ? i : null).filter(v => v !== null);
        move = empty[Math.floor(Math.random() * empty.length)];
      } else {
        move = minimax(board, ai).index;
      }

      board[move] = ai;
      render();

      if (checkWinner(board, ai)) {
        statusEl.textContent = 'AI wins!';
        gameOver = true;
        return;
      }

      if (isDraw()) {
        statusEl.textContent = 'Draw!';
        gameOver = true;
        return;
      }

      statusEl.textContent = `${player}'s turn`;
    }

    function checkWinner(b, symbol) {
      return winCombos.some(combo => combo.every(i => b[i] === symbol));
    }

    function isDraw() {
      return board.every(cell => cell !== '');
    }

    function minimax(newBoard, currentPlayer) {
      const avail = newBoard.map((v,i) => v === '' ? i : null).filter(v => v !== null);

      if (checkWinner(newBoard, player)) return { score: -10 };
      if (checkWinner(newBoard, ai)) return { score: 10 };
      if (avail.length === 0) return { score: 0 };

      const moves = [];

      for (let i = 0; i < avail.length; i++) {
        const move = {};
        move.index = avail[i];
        newBoard[avail[i]] = currentPlayer;

        if (currentPlayer === ai) {
          move.score = minimax(newBoard, player).score;
        } else {
          move.score = minimax(newBoard, ai).score;
        }

        newBoard[avail[i]] = '';
        moves.push(move);
      }

      let bestMove;

      if (currentPlayer === ai) {
        let bestScore = -Infinity;
        for (let i = 0; i < moves.length; i++) {
          if (moves[i].score > bestScore) {
            bestScore = moves[i].score;
            bestMove = i;
          }
        }
      } else {
        let bestScore = Infinity;
        for (let i = 0; i < moves.length; i++) {
          if (moves[i].score < bestScore) {
            bestScore = moves[i].score;
            bestMove = i;
          }
        }
      }

      return moves[bestMove];
    }

    startGame();
  </script>
</body>
</html>
